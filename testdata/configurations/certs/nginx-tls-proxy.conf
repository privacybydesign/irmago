events {}
http {
    # TLS proxy for the veramo OID4VCI issuer + EUDI Python PID issuer
    server {
        listen 443 ssl;
        server_name localhost;
        ssl_certificate /etc/nginx/certs/localhost.crt;
        ssl_certificate_key /etc/nginx/certs/localhost.key;

        # EUDI Python PID issuer AS — the backend always advertises the AS at
        # {service_url}/oidc, so it lives under the same prefix as the backend.
        # This block must come BEFORE the broader /eudi-pid-issuer-py/ block.
        location /eudi-pid-issuer-py/oidc/ {
            proxy_pass http://eudi-pid-issuer-py-as.localhost:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Prefix /eudi-pid-issuer-py/oidc;
        }

        # EUDI Python PID issuer backend (non-URL vct: urn:eudi:pid:1)
        location /eudi-pid-issuer-py/ {
            proxy_pass http://eudi-pid-issuer-py.localhost:5000/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Prefix /eudi-pid-issuer-py;
        }

        # Default: veramo OID4VCI issuer (existing /test-issuer, /authcode-issuer, /batch2-issuer)
        location / {
            proxy_pass http://veramo-openid4vci.localhost:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # TLS proxy for the veramo OID4VP verifier
    server {
        listen 444 ssl;
        server_name localhost;
        ssl_certificate /etc/nginx/certs/localhost.crt;
        ssl_certificate_key /etc/nginx/certs/localhost.key;
        location / {
            proxy_pass http://veramo-openid4vp.localhost:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # TLS proxy for the IETF status list agent. Public origin
    # https://localhost:8445 — used for the statuslist+jwt token `uri`/`sub`
    # and the agent's did:web (did:web:localhost%3A8445, resolved at
    # /.well-known/did.json). veramo's admin calls use the internal http
    # alias instead, so they don't traverse this proxy.
    server {
        listen 445 ssl;
        server_name localhost;
        ssl_certificate /etc/nginx/certs/localhost.crt;
        ssl_certificate_key /etc/nginx/certs/localhost.key;
        location / {
            proxy_pass http://statuslist-agent.localhost:9156;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
