<svg width="900" height="1060" viewBox="0 0 900 1060" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: ui-monospace, "Cascadia Code", Consolas, monospace; }
  .title { font-size:13px; font-weight:700; }
  .sub   { font-size:11px; }
  .label { font-size:10px; }
  .tag   { font-size:9px; font-style:italic; }
</style>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
  </marker>
</defs>

<!-- Title -->
<text x="450" y="36" text-anchor="middle" style="font-size:15px;font-weight:700;font-family:ui-monospace,monospace;" fill="#1a1a2e">Certificate Chain — EU AV Blueprint (Option 3)</text>

<!-- ══════════════════════════════════════════ -->
<!-- LEVEL 1: EU Root CA -->
<!-- ══════════════════════════════════════════ -->
<rect x="180" y="60" width="540" height="130" rx="10" fill="#eeedfb" stroke="#534ab7" stroke-width="1.5"/>
<text x="450" y="84" text-anchor="middle" class="title" fill="#3c3489">EU Root CA</text>
<line x1="188" y1="94" x2="712" y2="94" stroke="#bbb8e8" stroke-width="0.5"/>

<text x="200" y="116" class="label" fill="#444">Subject:</text>
<text x="320" y="116" class="sub" fill="#3c3489">"EU Age Verification Trust List CA"</text>

<text x="200" y="136" class="label" fill="#444">Signed by:</text>
<text x="320" y="136" class="sub" fill="#888">self-signed</text>

<text x="200" y="156" class="label" fill="#444">Location:</text>
<text x="320" y="156" class="label" fill="#555">offline vault — EU Commission</text>

<text x="200" y="174" class="label" fill="#444">Purpose:</text>
<text x="320" y="174" class="label" fill="#555">pre-installed on all compliant verifiers — you don't manage this</text>

<!-- Arrow 1 → 2 -->
<line x1="450" y1="190" x2="450" y2="234" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="466" y="216" class="tag" fill="#888">signs</text>

<!-- ══════════════════════════════════════════ -->
<!-- LEVEL 2: Yivi IACA cert -->
<!-- ══════════════════════════════════════════ -->
<rect x="180" y="236" width="540" height="150" rx="10" fill="#d8f5eb" stroke="#0f6e56" stroke-width="1.5"/>
<text x="450" y="260" text-anchor="middle" class="title" fill="#08503a">Yivi Intermediate / IACA Cert</text>
<line x1="188" y1="270" x2="712" y2="270" stroke="#a0d8c0" stroke-width="0.5"/>

<text x="200" y="292" class="label" fill="#444">Subject:</text>
<text x="320" y="292" class="sub" fill="#08503a">"Yivi Age Verification CA"</text>

<text x="200" y="312" class="label" fill="#444">Signed by:</text>
<text x="320" y="312" class="sub" fill="#555">EU root CA</text>

<text x="200" y="332" class="label" fill="#444">Location:</text>
<text x="320" y="332" class="label" fill="#555">offline / restricted HSM — Yivi manages this</text>

<text x="200" y="352" class="label" fill="#444">Purpose:</text>
<text x="320" y="352" class="label" fill="#555">signs DS certs only — issued when Yivi registers as AP on EU trust list</text>

<text x="200" y="372" class="label" fill="#444">Travels in:</text>
<text x="320" y="372" class="label" fill="#0f6e56">x5chain header 33 (alongside DS cert)</text>

<!-- Arrow 2 → 3 -->
<line x1="450" y1="386" x2="450" y2="430" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="466" y="412" class="tag" fill="#888">signs</text>

<!-- ══════════════════════════════════════════ -->
<!-- LEVEL 3: Yivi DS cert -->
<!-- ══════════════════════════════════════════ -->
<rect x="180" y="432" width="540" height="150" rx="10" fill="#fce8e8" stroke="#a03030" stroke-width="1.5"/>
<text x="450" y="456" text-anchor="middle" class="title" fill="#a03030">Yivi DS Cert  (Document Signer)</text>
<line x1="188" y1="466" x2="712" y2="466" stroke="#f0a0a0" stroke-width="0.5"/>

<text x="200" y="488" class="label" fill="#444">Subject:</text>
<text x="320" y="488" class="sub" fill="#a03030">"Yivi Age Verification DS - 001"</text>

<text x="200" y="508" class="label" fill="#444">Signed by:</text>
<text x="320" y="508" class="sub" fill="#555">Yivi IACA cert</text>

<text x="200" y="528" class="label" fill="#444">Location:</text>
<text x="320" y="528" class="label" fill="#555">online HSM — used for every MSO signing operation</text>

<text x="200" y="548" class="label" fill="#444">Purpose:</text>
<text x="320" y="548" class="label" fill="#555">signs every MSO your Go code produces</text>

<text x="200" y="568" class="label" fill="#444">Travels in:</text>
<text x="320" y="568" class="label" fill="#a03030">x5chain header 33 (leaf cert — verifier uses public key to verify MSO)</text>

<!-- Arrow 3 → MSO -->
<line x1="450" y1="582" x2="450" y2="626" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="466" y="608" class="tag" fill="#888">signs</text>

<!-- ══════════════════════════════════════════ -->
<!-- LEVEL 4: MSO -->
<!-- ══════════════════════════════════════════ -->
<rect x="280" y="628" width="340" height="40" rx="8" fill="#fff5f5" stroke="#c04040" stroke-width="1"/>
<text x="450" y="653" text-anchor="middle" class="sub" fill="#a03030">MSO  (COSE_Sign1 payload — your mDoc)</text>

<!-- footer -->
<text x="450" y="676" text-anchor="middle" style="font-size:9px;font-family:ui-monospace,monospace;" fill="#aaa">EU root not included in x5chain — verifier has it pre-installed  |  DS + IACA travel together in header 33</text>

<!-- ══════════════════════════════════════════ -->
<!-- DEPLOYMENT PHASES -->
<!-- ══════════════════════════════════════════ -->
<text x="450" y="716" text-anchor="middle" style="font-size:13px;font-weight:700;font-family:ui-monospace,monospace;" fill="#1a1a2e">Deployment Phases</text>

<!-- Phase 1 -->
<rect x="40" y="730" width="240" height="130" rx="8" fill="#f2f2f2" stroke="#999" stroke-width="1.2" stroke-dasharray="5,3"/>
<text x="160" y="752" text-anchor="middle" style="font-size:11px;font-weight:700;font-family:ui-monospace,monospace;" fill="#555">Phase 1 — Testing</text>
<line x1="48" y1="762" x2="272" y2="762" stroke="#ccc" stroke-width="0.5"/>
<text x="56" y="782" style="font-size:10px;font-family:ui-monospace,monospace;" fill="#666">Self-signed cert only</text>
<text x="56" y="800" style="font-size:10px;font-family:ui-monospace,monospace;" fill="#666">No chain validation</text>
<text x="56" y="818" style="font-size:10px;font-family:ui-monospace,monospace;" fill="#666">Development and internal</text>
<text x="56" y="836" style="font-size:10px;font-family:ui-monospace,monospace;" fill="#666">testing only</text>
<text x="56" y="854" style="font-size:9px;font-style:italic;font-family:ui-monospace,monospace;" fill="#c06010">← what we have now</text>

<!-- Phase 2 -->
<rect x="330" y="730" width="240" height="130" rx="8" fill="#d8f5eb" stroke="#0f6e56" stroke-width="1.2"/>
<text x="450" y="752" text-anchor="middle" style="font-size:11px;font-weight:700;font-family:ui-monospace,monospace;" fill="#08503a">Phase 2 — Pilot</text>
<line x1="338" y1="762" x2="562" y2="762" stroke="#a0d8c0" stroke-width="0.5"/>
<text x="346" y="782" style="font-size:10px;font-family:ui-monospace,monospace;" fill="#08503a">Yivi generates own</text>
<text x="346" y="800" style="font-size:10px;font-family:ui-monospace,monospace;" fill="#08503a">IACA + DS cert pair</text>
<text x="346" y="818" style="font-size:10px;font-family:ui-monospace,monospace;" fill="#08503a">Verifiers manually trust</text>
<text x="346" y="836" style="font-size:10px;font-family:ui-monospace,monospace;" fill="#08503a">Yivi IACA root</text>
<text x="346" y="854" style="font-size:9px;font-style:italic;font-family:ui-monospace,monospace;" fill="#555">small closed ecosystem</text>

<!-- Phase 3 -->
<rect x="620" y="730" width="240" height="130" rx="8" fill="#eeedfb" stroke="#534ab7" stroke-width="1.5"/>
<text x="740" y="752" text-anchor="middle" style="font-size:11px;font-weight:700;font-family:ui-monospace,monospace;" fill="#3c3489">Phase 3 — Production</text>
<line x1="628" y1="762" x2="852" y2="762" stroke="#bbb8e8" stroke-width="0.5"/>
<text x="636" y="782" style="font-size:10px;font-family:ui-monospace,monospace;" fill="#3c3489">Yivi registers on EU</text>
<text x="636" y="800" style="font-size:10px;font-family:ui-monospace,monospace;" fill="#3c3489">AP trust list</text>
<text x="636" y="818" style="font-size:10px;font-family:ui-monospace,monospace;" fill="#3c3489">IACA cert signed by</text>
<text x="636" y="836" style="font-size:10px;font-family:ui-monospace,monospace;" fill="#3c3489">EU root</text>
<text x="636" y="854" style="font-size:9px;font-style:italic;font-family:ui-monospace,monospace;" fill="#555">any compliant verifier auto-trusts</text>

<!-- Phase arrows -->
<line x1="282" y1="795" x2="328" y2="795" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
<line x1="572" y1="795" x2="618" y2="795" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>

<!-- bottom note -->
<text x="450" y="900" text-anchor="middle" style="font-size:9px;font-family:ui-monospace,monospace;" fill="#aaa">Code structure stays the same across all phases — only the cert chain depth and trust anchor changes</text>

</svg>
