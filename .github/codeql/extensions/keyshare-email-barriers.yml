extensions:
  - addsTo:
      pack: codeql/go-all
      extensible: neutralModel
    data:
      # buildRecipients validates addresses via mail.ParseAddressList, which rejects CR/LF and
      # other control characters, then returns only addr.Address (no display name). Declaring it
      # neutral (no taint summary) tells CodeQL that taint does not propagate from the input
      # slice through to the returned address slice.
      - ["github.com/privacybydesign/irmago/irma/server/keyshare", "", false, "buildRecipients", "", "summary", "manual"]
